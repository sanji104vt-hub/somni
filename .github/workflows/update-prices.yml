name: Update Rakuten Prices

on:
  schedule:
    # 毎週月曜 03:00 JST (UTC前日18:00)
    - cron: "0 18 * * 0"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update_prices.py
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_ORIGIN: https://somni.asutelu.com/
        run: python update_prices.py public/index.html

      - name: Regenerate product pages and SEO files
        run: |
          node gen-goods.mjs
          node gen-types.mjs
          node generate-seo.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public; then
            echo "No price/image or generated-page changes."
          else
            git add public
            git commit -m "chore: update Rakuten prices and generated pages (scheduled)"
            git push
          fi
